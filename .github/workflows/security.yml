name: Security Scan

on:
  push:
    branches: ["master", "main"]
  pull_request:
    branches: ["master", "main"]
  schedule:
    # Run every Monday at 08:00 UTC — catch newly disclosed vulnerabilities
    - cron: "0 8 * * 1"

jobs:
  audit:
    name: Dependency Vulnerability Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit (high + critical — blocks build)
        # Now clean at --audit-level=high (0 vulnerabilities).
        # Fails the build if any high or critical CVE is introduced.
        run: npm audit --audit-level=high

      - name: Report moderate vulnerabilities (informational)
        run: npm audit --audit-level=moderate || true

      - name: Run security test suite
        run: npm run test:security

  codeql:
    name: CodeQL Static Analysis
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript
          queries: security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:javascript"
